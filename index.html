<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valor de Tarjeta de Los 15 de Mia</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    .card {
      background: white;
      padding: 30px 25px;
      border-radius: 18px;
      box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.15);
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    .titulo {
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    .precios {
      margin: 20px 0;
    }

    .fila {
      margin: 14px 0;
    }

    .label {
      font-size: 14px;
      color: #888;
    }

    .valor {
      font-size: 26px;
      font-weight: bold;
    }

    .datos {
      margin-top: 25px;
      font-size: 15px;
    }

    .datos strong {
      display: block;
      margin-top: 5px;
      font-size: 15px;
      color: #000;
    }

    .fecha {
      font-size: 15px;
      color: gray;
      margin-top: 20px;
      font-weight: bold;
    }

    @media (max-width: 480px) {
      .valor {
        font-size: 28px;
      }
    }
  </style>

</head>

<body>

  <div class="card">
    <div class="precios" id="precios"></div>

    <div class="datos">
      CUENTA BANCARIA PARA TRANSFERENCIA:
      <strong>ALIAS:</strong> XXXXX
      <strong>NOMBRE:</strong> EMILIANO GARCIA
    </div>

    <div class="fecha" id="fecha"></div>
  </div>


  <script src="inflacion.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {

      let valoresBase = {
        adultos: 121504.93,
        jovenes: 110459.03,
        ninos: 60752.46
      };

      if (typeof inflaciones === "undefined") {
        console.error("inflacion.js no cargó");
        return;
      }

      let clavesOrdenadas = Object.keys(inflaciones).sort((a, b) => {
        let [mesA, anioA] = a.split("-");
        let [mesB, anioB] = b.split("-");
        return new Date(anioA, mesA - 1) - new Date(anioB, mesB - 1);
      });

      let factor = 1;
      clavesOrdenadas.forEach(k => {
        factor *= (1 + Number(inflaciones[k]) / 100);
      });

      function formatearMes(clave) {
        let [mes, anio] = clave.split("-");
        const nombresMeses = [
          "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
          "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
        ];
        return nombresMeses[parseInt(mes) - 1] + " " + anio;
      }

      let ultimoMes = clavesOrdenadas.length > 0
        ? formatearMes(clavesOrdenadas[clavesOrdenadas.length - 1])
        : "Inicio";

      function redondear(valor) {
        return Math.ceil(valor);
      }

      function formatear(valor) {
        return valor.toLocaleString('es-AR', {
          style: 'currency',
          currency: 'ARS',
          minimumFractionDigits: 0
        });
      }

      let adultos = formatear(redondear(valoresBase.adultos * factor));
      let jovenes = formatear(redondear(valoresBase.jovenes * factor));
      let ninos = formatear(redondear(valoresBase.ninos * factor));

      document.getElementById("precios").innerHTML = `
        <div class="titulo">VALORES DE TARJETAS</div>

        <div class="fila">
          <div class="label">👤 ADULTOS</div>
          <div class="valor">${adultos}</div>
        </div>

        <div class="fila">
          <div class="label">🧑 JÓVENES (11 a 15 años)</div>
          <div class="valor">${jovenes}</div>
        </div>

        <div class="fila">
          <div class="label">👶 NIÑOS (3 a 10 años)</div>
          <div class="valor">${ninos}</div>
        </div>
      `;

      const fecha = new Date();
      const opciones = { day: '2-digit', month: '2-digit', year: 'numeric' };

      document.getElementById("fecha").innerText =
        "*Valores actualizados a la fecha por IPC " +
        fecha.toLocaleDateString('es-AR', opciones);

    });
  </script>

</body>

</html>
